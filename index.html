<!DOCTYPE html>
<html>
<head>
<title>ANISH X PANEL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background:url('bg.jpg') no-repeat center;
  background-size:cover;
}
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.75);
  z-index:-1;
}
.container{padding:20px;}

/* BRAND */
.brand-box{
  margin:20px auto;
  padding:20px;
  max-width:400px;
  border-radius:20px;
  background:rgba(0,0,0,0.8);
  animation:glowBox 4s infinite linear;
}
@keyframes glowBox{
  0%{box-shadow:0 0 15px red;}
  25%{box-shadow:0 0 20px blue;}
  50%{box-shadow:0 0 25px pink;}
  75%{box-shadow:0 0 25px purple;}
  100%{box-shadow:0 0 30px gold;}
}
.brand{
  font-size:28px;
  font-weight:bold;
  background:linear-gradient(90deg,gold,red,blue,pink,purple,gold);
  background-size:400%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 5s linear infinite;
}
@keyframes shine{
  0%{background-position:0%;}
  100%{background-position:400%;}
}

/* BOX */
.box{
  margin:20px auto;
  padding:15px;
  max-width:400px;
  border-radius:15px;
  background:rgba(0,0,0,0.75);
  animation:glow 4s infinite linear;
}
@keyframes glow{
  0%{box-shadow:0 0 10px red;}
  25%{box-shadow:0 0 15px blue;}
  50%{box-shadow:0 0 20px pink;}
  75%{box-shadow:0 0 20px purple;}
  100%{box-shadow:0 0 25px gold;}
}

select,button{
  width:90%;
  padding:12px;
  border-radius:8px;
}
button{
  background:green;
  color:white;
  margin-top:10px;
}

/* INSTAGRAM */
.insta-box{
  margin:25px auto;
  max-width:300px;
  padding:15px;
  border-radius:15px;
  background:linear-gradient(45deg,#ff0066,#ffcc00);
  animation:glow 4s infinite linear;
}
.insta-box a{
  text-decoration:none;
  color:white;
  font-weight:bold;
}

/* TRUST */
.trust-box{
  margin:20px auto;
  max-width:350px;
  padding:15px;
  border-radius:15px;
  background:rgba(0,0,0,0.8);
  animation:glow 4s infinite linear;
}

.qr{width:200px;background:white;border-radius:10px;}
</style>
</head>

<body>
<div class="container">

<div class="brand-box">
<h1 class="brand">👑 ANISH X PANEL</h1>
</div>

<div class="box">
<h3>SCAN & PAY</h3>
<img src="qr.png" class="qr">
<p>UPI: anishxpanel@upi</p>
</div>

<div class="box">
<h3>SELECT PRODUCT</h3>

<select id="product" onchange="updatePrice()">
<option value="">Select Product</option>

<!-- NON ROOT -->
<option disabled>--- NON ROOT DEVICE ---</option>
<option value="79">Drip Client - 1 Day</option>
<option value="350">Drip Client - 7 Days</option>
<option value="680">Drip Client - 15 Days</option>
<option value="999">Drip Client - 30 Days</option>

<option value="130">HG Cheats - 1 Day</option>
<option value="450">HG Cheats - 10 Days</option>
<option value="1100">HG Cheats - 30 Days</option>

<option value="100">Prime Hook - 1 Day</option>
<option value="180">Prime Hook - 3 Days</option>
<option value="320">Prime Hook - 7 Days</option>
<option value="400">Prime Hook - 10 Days</option>
<option value="1280">Prime Hook - 30 Days</option>

<option value="700">Pato Safe - 7 Days</option>

<option value="450">Pato Brutal - 3 Days</option>
<option value="750">Pato Brutal - 7 Days</option>

<!-- ROOT -->
<option disabled>--- ROOT + VPHONE ---</option>
<option value="150">Haxx Cker - 3 Days</option>
<option value="300">Haxx Cker - 7 Days</option>
<option value="550">Haxx Cker - 15 Days</option>
<option value="750">Haxx Cker - 10 Days</option>
<option value="1100">Haxx Cker - 20 Days</option>
<option value="1650">Haxx Cker - 30 Days</option>
<option value="999">Haxx Cker - 30 Days Alt</option>

<option value="700">BR Mode - 10 Days</option>
<option value="1180">BR Mode - 20 Days</option>
<option value="1640">BR Mode - 30 Days</option>

<!-- IOS -->
<option disabled>--- IOS PANEL ---</option>
<option value="420">Fluorite - 1 Day</option>
<option value="1250">Fluorite - 7 Days</option>
<option value="1900">Fluorite - 30 Days</option>

<option value="500">Gbox - 30 Days</option>

<option value="999">Total iOS - 1 Day</option>
<option value="1710">Total iOS - 7 Days</option>
<option value="2510">Total iOS - 30 Days</option>

<!-- PC -->
<option disabled>--- PC PANEL ---</option>
<option value="150">Terminal X - 1 Day</option>
<option value="700">Terminal X - 10 Days</option>
<option value="1600">Terminal X - 30 Days</option>

</select>

<div id="price">Price: ₹0</div>
<div id="orderid"></div>

<button onclick="sendWhatsApp()">Pay & Send Screenshot</button>
</div>

<!-- INSTAGRAM -->
<div class="insta-box">
<a href="https://instagram.com/mr_shetty_47_" target="_blank">
📸 FOLLOW ON INSTAGRAM  
<br>@mr_shetty_47_
</a>
</div>

<!-- TRUST -->
<div class="trust-box">
✔ FULL TRUSTED SELLER<br>
✔ 24/7 SUPPORT<br>
✔ INSTANT DELIVERY<br>
✔ SAFE PAYMENT<br>
✔ FAST RESPONSE
</div>

</div>

<script>
let orderID="AXP"+Math.floor(Math.random()*1000000000);
document.getElementById("orderid").innerHTML="Order ID: "+orderID;

function updatePrice(){
document.getElementById("price").innerHTML="Price: ₹"+document.getElementById("product").value;
}

function sendWhatsApp(){
let p=document.getElementById("product");
let name=p.options[p.selectedIndex].text;
let price=p.value;

if(price===""){alert("Select product");return;}

let msg="Order ID: "+orderID+"%0AProduct: "+name+"%0AAmount: ₹"+price;
window.open("https://wa.me/919546193795?text="+msg);
}
</script>

</body>
</html>
