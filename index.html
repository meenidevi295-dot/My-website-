<!DOCTYPE html>
<html>

      text-align: center;

    body::before {

    select {
      padding: 12px;
      width: 90%;

      font-size: 16px;
    }

    button {
      padding: 14px;
      background: green;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      margin-top: 12px;
      width: 90%;

    img.qr {

    h1 {

<script>
function sendWhatsApp() {

    alert("Select product first!");

  }

  var msg = "Hello, I have paid for: " + product;
  var url = "https://wa.me/919546193795?text=" + encodeURIComponent(msg);

  window.open(url, "_blank");
}
</script>
