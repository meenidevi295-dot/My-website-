<!DOCTYPE html>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  text-align:center;
}

/* RGB BOX */
@keyframes rgbGlow{
0%{box-shadow:0 0 20px red;}
25%{box-shadow:0 0 25px blue;}
50%{box-shadow:0 0 25px cyan;}
75%{box-shadow:0 0 25px magenta;}
100%{box-shadow:0 0 30px lime;}
}

/* RGB TEXT */
@keyframes rgbText{
0%{background-position:0%;}
100%{background-position:400%;}
}

.box{
  margin:20px;
  padding:20px;
  border-radius:20px;
  background:#111;
  animation:rgbGlow 4s infinite linear;
}

.brand{
  font-size:28px;
  font-weight:bold;
  background:linear-gradient(90deg, red, orange, yellow, lime, cyan, blue, violet, red);
  background-size:400%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:rgbText 5s linear infinite;
}

select,button{
  width:90%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

button{
  background:linear-gradient(90deg,green,lime);
  color:white;
  font-weight:bold;
}

.telegram{
  display:block;
  margin:20px;
  padding:15px;
  border-radius:20px;
  background:linear-gradient(90deg, red, orange, yellow, green, blue, purple);
  font-weight:bold;
  text-decoration:none;
  color:white;
}

.trust{
  margin:20px;
  padding:15px;
  border-radius:20px;
  background:#111;
  animation:rgbGlow 4s infinite linear;
}

.trust span{
  background:linear-gradient(90deg, red, yellow, lime, cyan, blue, pink, red);
  background-size:400%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:rgbText 5s linear infinite;
  font-weight:bold;
}

.ai-box{
  margin:20px;
  padding:10px;
  background:#000;
  border-radius:15px;
  height:220px;
  animation:rgbGlow 4s infinite linear;
}

#chat{
  height:150px;
  overflow-y:auto;
  text-align:left;
  font-size:14px;
}

#userInput{
  width:90%;
  padding:10px;
  border-radius:10px;
  border:none;
}
</style>
</head>

<script>
let orderID="AXP"+Math.floor(Math.random()*1000000000);
document.getElementById("orderid").innerHTML="Order ID: "+orderID;

function updatePrice(){
let p=document.getElementById("product");
document.getElementById("price").innerHTML="Price: ₹"+p.value;
}

function sendWhatsApp(){
let p=document.getElementById("product");
let name=p.options[p.selectedIndex].text;
let price=p.value;

if(price===""){alert("Select product");return;}

let msg="Order ID: "+orderID+"%0AProduct: "+name+"%0AAmount: ₹"+price;
window.open("https://wa.me/919546193795?text="+msg);
}

/* 🔥 ADVANCED AI */
function sendMsg(){
let input=document.getElementById("userInput");
let chat=document.getElementById("chat");

let text=input.value.toLowerCase();
if(text==="") return;

chat.innerHTML += "<div>🧑: "+text+"</div>";

let reply="🤖 Samajh nahi aaya 😅";

if(text.includes("hi") || text.includes("hello") || text.includes("hey")){
reply="👋 Hello bhai!\n🎮 Game me se preshan ho?\n😎 Tension mat le, sab theek kar dunga!";
}
else if(text.includes("price") || text.includes("kitna")){
reply="💰 Product select karo, price auto dikhega 👍";
}
else if(text.includes("buy") || text.includes("kaise")){
reply="🛒 Steps:\n1. Product select\n2. Payment\n3. Screenshot WhatsApp pe bhejo";
}
else if(text.includes("safe") || text.includes("best")){
reply="🔥 Sabse safe: Haxx Cker Pro\n⚡ Best: Pato Brutal";
}
else if(text.includes("drip")){
reply="📦 Drip Client available hai — smooth gameplay 👍";
}
else if(text.includes("hg")){
reply="📦 HG Cheats safe aur popular hai 🔥";
}
else if(text.includes("haxx")){
reply="👑 Haxx Cker Pro = Main ID Safe 💯";
}

chat.innerHTML += "<div>🤖: "+reply+"</div>";

input.value="";
chat.scrollTop=chat.scrollHeight;
}
</script>
