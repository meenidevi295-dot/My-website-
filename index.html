<!DOCTYPE html>
<html>
<head>
  <title>ANISH X PANEL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:#0f172a; color:white; text-align:center; font-family:Arial;">

<h1>ANISH X PANEL</h1>

<p>Select Product → Pay → Send Screenshot</p>

<!-- QR IMAGE -->
<img src="qr.png" width="200"><br><br>

<!-- PRODUCT SELECT -->
<select id="product" style="padding:10px; font-size:16px;">
  <option value="">Select Product</option>
  <option>REAPER X PRO - 10 Day ₹690</option>
  <option>REAPER X PRO - 30 Day ₹1450</option>
  <option>DRIP CLIENT - 1 Day ₹75</option>
  <option>DRIP CLIENT - 7 Day ₹320</option>
  <option>DRIP CLIENT - 15 Day ₹610</option>
  <option>HG CHEATS - 10 Day ₹450</option>
  <option>PATO TEAM - 3 Day ₹310</option>
  <option>HAXX CKER PRO - 10 Day ₹860</option>
  <option>HAXX CKER PRO - 30 Day ₹1250</option>
  <option>Fluorite FF iOS - 1 Day ₹390</option>
  <option>Fluorite FF iOS - 7 Day ₹980</option>
  <option>Fluorite FF iOS - 31 Day ₹1799</option>
  <option>BR MODE ROOT - 1 Day ₹70</option>
  <option>BR MODE ROOT - 7 Day ₹210</option>
  <option>BR MODE ROOT - 15 Day ₹350</option>
  <option>BR MODE ROOT - 30 Day ₹500</option>
</select>

<br><br>

<!-- BUTTON -->
<button onclick="sendWhatsApp()" 
style="padding:12px; background:#22c55e; color:white; border:none; border-radius:5px; font-size:16px;">
Pay & Send Screenshot
</button>

<script>
function sendWhatsApp() {
  var product = document.getElementById("product").value;

  if(product === "") {
    alert("Please select a product!");
    return;
  }

  var message = "Hello, I have paid for: " + product;
  var url = "https://wa.me/919546193795?text=" + encodeURIComponent(message);

  window.open(url, "_blank");
}
</script>

</body>
</html>
